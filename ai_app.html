<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crossy Golf</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
    font-family: 'Press Start 2P', cursive;
    background-color: #3f6e1f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    flex-direction: column;
    color: white;
}

#game-container {
    position: relative;
    width: 300px;
    height: 500px;
    background: #5cb85c;
    border: 5px solid #2e8b57;
    overflow: hidden;
}

#player {
    position: absolute;
    width: 30px;
    height: 30px;
    bottom: 10px;
    left: 135px;
    font-size: 20px;
}

.obstacle {
    position: absolute;
    background: brown;
}

.water {
    position: absolute;
    height: 40px;
    background: #4682b4;
}

#score {
    margin: 10px;
}

#message, #startScreen {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: black;
    padding: 20px;
    display: none;
    text-align: center;
    z-index: 100;
}

button {
    margin-top: 10px;
    padding: 10px;
    font-family: inherit;
}
</style>
</head>

<body>

<h1>Crossy Golf</h1>
<div id="score">Score: 0</div>

<div id="game-container">
    <div id="player">🏌️</div>

    <div id="startScreen">
        <p>Use WASD or Arrow Keys to move</p>
        <p>Reach the hole, avoid sand & water!</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="message"></div>
</div>

<button id="restartBtn" style="display:none;">Play Again</button>

<script>
const gameContainer = document.getElementById("game-container");
const player = document.getElementById("player");
const scoreDisplay = document.getElementById("score");
const message = document.getElementById("message");
const restartBtn = document.getElementById("restartBtn");
const startScreen = document.getElementById("startScreen");

const width = 300;
const height = 500;

let playerX, playerY;
let score;
let gameActive;
let OBSTACLE_SPEED = 2;

const keys = {};
const obstacles = [];

function startGame() {
    startScreen.style.display = "none";
    initGame();
}

function initGame() {
    playerX = 135;
    playerY = 440;
    score = 0;
    gameActive = true;

    message.style.display = "none";
    restartBtn.style.display = "none";

    scoreDisplay.textContent = "Score: 0";

    obstacles.forEach(o => o.el.remove());
    obstacles.length = 0;

    for (let i = 0; i < 8; i++) createObstacle();

    gameLoop();
}

function createObstacle() {
    const type = Math.random() < 0.5 ? "sand" : "water";
    const el = document.createElement("div");

    let w, h, x;

    if (type === "water") {
        el.className = "water";
        w = 150 + Math.random() * 100;
        h = 40;
    } else {
        el.className = "obstacle";
        w = 60 + Math.random() * 40;
        h = 30;
    }

    x = Math.random() * (width - w);

    el.style.width = w + "px";
    el.style.height = h + "px";
    el.style.left = x + "px";
    el.style.top = (-Math.random() * height) + "px";

    gameContainer.appendChild(el);

    obstacles.push({ el, type, x, y: parseFloat(el.style.top), w, h });
}

function movePlayer() {
    const speed = 3;

    if (keys["ArrowUp"] || keys["w"]) playerY -= speed;
    if (keys["ArrowDown"] || keys["s"]) playerY += speed;
    if (keys["ArrowLeft"] || keys["a"]) playerX -= speed;
    if (keys["ArrowRight"] || keys["d"]) playerX += speed;

    playerX = Math.max(0, Math.min(width - 30, playerX));
    playerY = Math.max(0, Math.min(height - 30, playerY));

    player.style.left = playerX + "px";
    player.style.top = playerY + "px";

    if (playerY < height - 50 - (score + 1) * 30) {
        score++;
        scoreDisplay.textContent = "Score: " + score;
    }

    if (playerY <= 10) endGame("🎉 You Win!");
}

function updateObstacles() {
    const containerRect = gameContainer.getBoundingClientRect();

    obstacles.forEach(o => {
        o.y += OBSTACLE_SPEED;
        o.el.style.top = o.y + "px";

        if (o.y > height) {
            o.y = -50;
            o.el.style.top = o.y + "px";
        }

        // collision
        const r1 = player.getBoundingClientRect();
        const r2 = o.el.getBoundingClientRect();

        if (
            r1.left < r2.right &&
            r1.right > r2.left &&
            r1.top < r2.bottom &&
            r1.bottom > r2.top
        ) {
            endGame(o.type === "water" ? "🌊 Splash!" : "🏖️ Sand trap!");
        }
    });
}

function endGame(text) {
    gameActive = false;
    message.innerHTML = text + "<br>Score: " + score;
    message.style.display = "block";
    restartBtn.style.display = "block";
}

function gameLoop() {
    if (!gameActive) return;

    movePlayer();
    updateObstacles();

    requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

restartBtn.onclick = initGame;

// Show instructions first time
startScreen.style.display = "block";
</script>

</body>
</html>
